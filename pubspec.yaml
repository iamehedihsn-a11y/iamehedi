name: polytechnic_coaching
description: Polytechnic Coaching Platform - Full Featured Android App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.18.1
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  http: ^1.1.0
  video_player: ^2.8.1
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
